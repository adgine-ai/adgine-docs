# adgine.ai/docs → Cloudflare Pages (primary)
# Self-hosted fallback: uncomment the alias block and comment proxy block.

# Redirect bare /docs to /docs/
location = /docs {
    return 301 /docs/;
}

# --- Option A: Cloudflare Pages (recommended) ---
location /docs/ {
    proxy_pass https://adgine-docs.pages.dev/docs/;
    proxy_set_header Host adgine-docs.pages.dev;
    proxy_ssl_server_name on;
    proxy_redirect off;

    # Cache static assets at edge
    proxy_cache_valid 200 1h;
    add_header X-Docs-Source "cloudflare-pages" always;
}

